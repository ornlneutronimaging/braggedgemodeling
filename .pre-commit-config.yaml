# Fleet-standard pre-commit hooks (mirrors neutrons/python_project_template
# and CylindricalGeometryCorrection). Run locally with `pixi run -e lint
# pre-commit` and in CI via the `pre-commit` job in .github/workflows/CI.yml.
#
# NOTE: the fleet's `pixi-lock-check` local hook is intentionally omitted —
# braggedgemodeling does not yet commit a pixi.lock (tracked separately). Add
# it back together with the committed lockfile.
exclude: "^pixi.lock$"
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
        # a handful of committed reference spreadsheets/data files sit near
        # ~1 MB; 2 MB keeps them passing while still catching stray blobs
        args: [--maxkb=2048]
      - id: check-json
      - id: check-merge-conflict
      - id: check-toml
      - id: check-xml
      - id: check-yaml
        args: [--allow-multiple-documents]
      # keep data fixtures, notebooks, and the published JOSS paper byte-for-byte
      # (some are fixed-width scientific formats where trailing space may be
      # structural, and the paper is a published source)
      - id: end-of-file-fixer
        exclude: &fixtures '^(tests/(data/|NaCl\.cif|bem\.conf)|notebooks/|JOSS-paper/)'
      - id: trailing-whitespace
        exclude: *fixtures
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.21
    hooks:
      - id: ruff-check
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        additional_dependencies: [tomli]
        exclude: \.ipynb$
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks
  - repo: https://github.com/adrienverge/yamllint/
    rev: v1.38.0
    hooks:
      - id: yamllint
  - repo: https://github.com/ComPWA/taplo-pre-commit
    rev: v0.9.3
    hooks:
      - id: taplo-format
