name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pre-commit:
    name: pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0
        with:
          manifest-path: pyproject.toml
          environments: lint
      # cache the hook environments pre-commit builds (keyed on the config)
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
      - name: Run pre-commit on all files
        run: pixi run -e lint pre-commit

  unit-test:
    name: Unit tests (${{ matrix.environment }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: [py312, py313]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0
        with:
          manifest-path: pyproject.toml
          environments: ${{ matrix.environment }}
      - name: Run unit tests
        run: >-
          pixi run -e ${{ matrix.environment }} test
          --cov=braggedgemodeling --cov-report=xml --cov-report=term
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

  # grype scans the installed pixi env (pip + conda packages), gates only on
  # fixable findings, and uploads SARIF to the Security tab (org decision
  # 2026-06-10: grype, not pip-audit)
  dependency-scan:
    name: Scan dependencies with Grype
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # required for upload-sarif
      actions: read # upload-sarif on private repos
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0
        with:
          manifest-path: pyproject.toml
          environments: default
      - name: Scan pixi environment with Grype
        uses: neutrons/conda-actions/grype@bba9ca89d48d9ae846db9650cc63fde736340b3d # v2
        with:
          path: ${{ github.workspace }}/.pixi/envs/default
          # only-fixed defaults to true in the v2 wrapper, so unfixable
          # advisories never fail the build
          fail-build: true
